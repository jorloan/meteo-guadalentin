name: Actualizar Meteo Guadalentín

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  actualizar-meteo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sincronizar historial desde GitHub
        run: |
          git config pull.rebase false
          git pull origin main --no-edit || true

      - name: Verificar historial y rellenar si faltan datos
        run: |
          python3 check_historial.py || python3 fix_historial.py

      - name: Ejecutar mapa_totana.py
        run: python3 mapa_totana.py
        env:
          DISPLAY: ''

      - name: Commit y push
        run: |
          git config --local user.email "meteo-bot@lya-agricola.com"
          git config --local user.name "Meteo Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Meteo actualizada $(date +'%Y-%m-%d %H:%M')"
          git push
        continue-on-error: true
