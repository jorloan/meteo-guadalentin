name: Actualizar datos meteorológicos

# PAUSADO (2026-06-23): se detiene el bucle de actualización porque cada push
# a main dispara despliegues en una integración externa conectada al repo
# (Netlify), generando coste. Sin trigger automático (ni cron ni
# workflow_dispatch en cadena) no hay pushes nuevos, así que no hay nuevos
# despliegues. Para reactivarlo: restaurar el cron/bucle de este archivo
# desde el historial de git una vez confirmado que Netlify está desconectado.

on:
  workflow_dispatch:   # solo manual, sin cron ni auto-relanzado

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow pausado
        run: echo "Workflow pausado manualmente. No se realizan actualizaciones ni pushes."
