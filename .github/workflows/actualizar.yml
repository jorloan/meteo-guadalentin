name: Actualizar Meteo Guadalentín

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  actualizar-meteo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar mapa_totana.py
        run: python mapa_totana.py
        env:
          DISPLAY: ''

      - name: Commit y push
        run: |
          git config --local user.email "meteo-bot@lya-agricola.com"
          git config --local user.name "Meteo Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Meteo actualizada $(date +'%Y-%m-%d %H:%M')"
          git push
        continue-on-error: true
