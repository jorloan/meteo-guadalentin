name: Actualizar Mapa Meteo

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-map:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generar nuevo mapa (Descargar 600 estaciones)
        run: python mapa_totana.py

      - name: Subir mapa actualizado a GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Meteo Bot"
          git add public/index.html
          git commit -m "Actualización automática del mapa" || echo "No hay cambios que guardar"
          git push
