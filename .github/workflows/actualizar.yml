name: Actualizar Meteo Guadalentin

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  actualizar-meteo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sincronizar historial
        run: git config pull.rebase false && git pull origin main --no-edit || true

      - name: Verificar y rellenar historial
        run: python3 check_historial.py || python3 fix_historial.py

      - name: Ejecutar mapa
        run: python3 mapa_totana.py

      - name: Publicar cambios
        run: |
          git config --local user.email "meteo-bot@lya-agricola.com"
          git config --local user.name "Meteo Bot"
          git add -A
          git commit -m "Meteo $(date +'%Y-%m-%d %H:%M')" || true
          git push || true
