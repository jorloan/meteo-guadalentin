name: Actualizar mapa meteo

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: actualizar-mapa
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Ejecutar mapa_totana.py
        run: python mapa_totana.py
      - name: Publicar cambios
        run: |
          git config user.name "Meteo Guadalentin Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios que publicar"
          else
            git commit -m "🔄 Auto $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
